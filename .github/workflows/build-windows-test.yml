name: Build Zed for Testing

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_HOME: "C:\\n"

jobs:

  build_windows:
    runs-on: windows-2022

    steps:
    - name: Enable Long Paths
      run: |
        Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
        git config --global core.longpaths true

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: C:\n\registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache Cargo index
      uses: actions/cache@v4
      with:
        path: C:\n\git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache Cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Zed editor
      run: cargo build -p zed --release

    - name: Upload Zed executable
      uses: actions/upload-artifact@v4
      with:
        name: Zed-Windows-x86_64
        path: target/release/zed.exe
        retention-days: 7

    timeout-minutes: 120


  build_remote_server:
    runs-on: ubuntu-22.04
  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
  
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang build-essential pkg-config
  
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
  
    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
  
    - name: Build remote server
      run: cargo build -p remote_server --release
  
    - name: Rename server binary
      run: mv target/release/remote_server target/release/zed-remote-server
  
    - name: Upload remote server
      uses: actions/upload-artifact@v4
      with:
        name: zed-remote-server-linux-x86_64
        path: target/release/zed-remote-server
        retention-days: 7
  
    timeout-minutes: 120
